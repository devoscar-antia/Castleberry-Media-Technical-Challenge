include ':app'
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')

apply from: 'capacitor.settings.gradle'

dependencyResolutionManagement {
  // Modo estricto: solo repos en settings.gradle
  repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)   // :contentReference[oaicite:1]{index=1}
  repositories {
    google()            // repositorio oficial de Google :contentReference[oaicite:2]{index=2}
    mavenCentral()      // Maven Central :contentReference[oaicite:3]{index=3}

    // Repositorio local apuntando al directorio 'android/libs' del plugin
    maven {
      url = uri("$rootDir/../node_modules/@transistorsoft/capacitor-background-fetch/android/libs")
    }
    flatDir {
      // Sintaxis Groovy: dirs toma una String o lista de Strings
      dirs "$rootDir/../node_modules/@transistorsoft/capacitor-background-fetch/android/libs"
    }  // :contentReference[oaicite:4]{index=4}
  }
}